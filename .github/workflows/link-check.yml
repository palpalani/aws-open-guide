name: Link Check

# Weekly link audit + on-PR safety net for README.md.
# This repo's product is README.md (per CLAUDE.md). We don't scan other markdown.

on:
  push:
    branches: [main, master]
    paths:
      - 'README.md'
      - '.github/workflows/link-check.yml'
  pull_request:
    paths:
      - 'README.md'
  schedule:
    # Mondays 08:00 UTC — catches links that rot between releases
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Check README links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check links with lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --accept 200,206,403,429
            --max-concurrency 8
            --timeout 30
            --retry-wait-time 5
            README.md
          # Fail PR/push runs immediately; let scheduled runs file an issue instead.
          fail: ${{ github.event_name != 'schedule' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue on scheduled-run failure
        if: ${{ steps.lychee.outputs.exit_code != 0 && github.event_name == 'schedule' }}
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Broken links detected by weekly Link Check'
          content-filepath: ./lychee/out.md
          labels: |
            broken-link
            automated
